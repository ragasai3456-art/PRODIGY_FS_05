<!DOCTYPE html>
<html>
<head>
    <title>Social Media App</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 15px auto;
            width: 350px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        input {
            padding: 10px;
            margin: 5px;
            width: 220px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            background: #007bff;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .post {
            text-align: left;
        }

        .like-btn {
            background: #28a745;
        }

        .like-btn:hover {
            background: #1e7e34;
        }
    </style>
</head>

<body>

<h1>📱 Social Media App</h1>

<!-- LOGIN -->
<div class="card">
    <h3>Login</h3>
    <input id="email" placeholder="Email"><br>
    <input id="password" type="password" placeholder="Password"><br>
    <button onclick="login()">Login</button>
</div>

<!-- CREATE POST -->
<div class="card">
    <h3>Create Post</h3>
    <input id="content" placeholder="What's on your mind?"><br>
    <button onclick="createPost()">Post</button>
</div>

<h2>Feed</h2>
<div id="posts"></div>

<script>
let token = "";

// 🔐 LOGIN
async function login() {
    const res = await fetch("http://localhost:3000/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            email: document.getElementById("email").value,
            password: document.getElementById("password").value
        })
    });

    const data = await res.json();

    if (data.token) {
        token = data.token;
        alert("Login successful ✅");
        loadPosts();
    } else {
        alert("Login failed ❌");
    }
}

// 📝 CREATE POST
async function createPost() {
    if (!token) {
        alert("Please login first!");
        return;
    }

    await fetch("http://localhost:3000/api/posts", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": token
        },
        body: JSON.stringify({
            content: document.getElementById("content").value
        })
    });

    document.getElementById("content").value = "";
    loadPosts();
}

// 📥 LOAD POSTS
async function loadPosts() {
    const res = await fetch("http://localhost:3000/api/posts");
    const posts = await res.json();

    const container = document.getElementById("posts");
    container.innerHTML = "";

    posts.reverse().forEach(p => {
        container.innerHTML += `
            <div class="card post">
                <h4>${p.user?.username || "User"}</h4>
                <p>${p.content}</p>
                <p>❤️ ${p.likes.length} Likes</p>
                <button class="like-btn" onclick="likePost('${p._id}')">Like</button>
            </div>
        `;
    });
}

// ❤️ LIKE POST
async function likePost(id) {
    if (!token) {
        alert("Login first!");
        return;
    }

    await fetch(`http://localhost:3000/api/posts/like/${id}`, {
        method: "PUT",
        headers: {
            "Authorization": token
        }
    });

    loadPosts();
}

// auto load feed
loadPosts();

</script>

</body>
</html>
